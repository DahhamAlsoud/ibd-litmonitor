name: Update IBD Literature Reports

on:
  schedule:
    # Every Friday at 7:00 AM Pacific (14:00 UTC)
    - cron: '0 14 * * 5'
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  update-reports:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.2'
      
      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 'release'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libxml2-dev libssl-dev
      
      - name: Cache R packages
        uses: actions/cache@v3
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ hashFiles('DESCRIPTION') }}
          restore-keys: ${{ runner.os }}-r-
      
      - name: Install R packages
        run: |
          install.packages(c(
            "rentrez", "tidyverse", "lubridate", "jsonlite", 
            "xml2", "glue", "knitr", "rmarkdown", "ggplot2"
          ))
        shell: Rscript {0}
      
      - name: Set PubMed credentials
        env:
          PUBMED_EMAIL: ${{ secrets.PUBMED_EMAIL }}
          PUBMED_API_KEY: ${{ secrets.PUBMED_API_KEY }}
        run: |
          echo "PUBMED_EMAIL=$PUBMED_EMAIL" >> $GITHUB_ENV
          echo "PUBMED_API_KEY=$PUBMED_API_KEY" >> $GITHUB_ENV
      
      - name: Fetch papers and generate reports
        run: |
          Rscript -e 'source("R/core_functions.R"); papers <- get_papers(days_back = 7, use_cache = FALSE); message("Fetched ", nrow(papers), " papers")'
      
      - name: Render Quarto website
        run: |
          quarto render
      
      - name: Archive current report
        run: |
          DATE=$(date +%Y-%m-%d)
          cp docs/index.html "docs/${DATE}.html"
          echo "Archived report: ${DATE}.html"
      
      - name: Commit and push changes
        run: |
          git config user.name "IBD LitMonitor Bot"
          git config user.email "litmonitor@users.noreply.github.com"
          git add docs/ data_cache/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update reports - $(date +'%Y-%m-%d %H:%M')" && git push)
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          force_orphan: true
