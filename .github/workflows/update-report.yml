name: Update IBD LitMonitor

on:
  # Run every morning at 06:00 UTC (08:00 Brussels / 01:00 US-Eastern)
  schedule:
    - cron: "0 6 * * *"
  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write   # needed to commit the rendered docs/ back to the repo

jobs:
  render-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up R ──────────────────────────────────────────────────────────
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3"
          use-public-rspm: true   # faster binary installs on Ubuntu

      # ── 3. Cache R packages (speeds up subsequent runs) ──────────────────────
      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-pkgs-${{ hashFiles('**/DESCRIPTION') }}-v1
          restore-keys: r-pkgs-

      # ── 4. Install system libraries required by R packages ───────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libxml2-dev libcurl4-openssl-dev libssl-dev \
            libfontconfig1-dev libharfbuzz-dev libfribidi-dev \
            libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev

      # ── 5. Install R packages ─────────────────────────────────────────────────
      - name: Install R packages
        run: |
          Rscript -e "
            pkgs <- c(
              'rentrez', 'tidyverse', 'lubridate', 'jsonlite',
              'xml2', 'glue', 'knitr', 'rmarkdown'
            )
            missing <- pkgs[!pkgs %in% installed.packages()[,'Package']]
            if (length(missing) > 0) install.packages(missing, repos = 'https://cloud.r-project.org')
          "

      # ── 6. Set up Quarto ─────────────────────────────────────────────────────
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # ── 7. Write PubMed credentials from GitHub Secrets ─────────────────────
      #    In your repo: Settings → Secrets → Actions → New repository secret
      #    Add PUBMED_EMAIL and PUBMED_API_KEY
      - name: Configure PubMed credentials
        run: |
          echo "PUBMED_EMAIL=${{ secrets.PUBMED_EMAIL }}" >> ~/.Renviron
          echo "PUBMED_API_KEY=${{ secrets.PUBMED_API_KEY }}" >> ~/.Renviron

      # ── 8. Clear old cache so we always fetch fresh papers ───────────────────
      - name: Clear paper cache
        run: rm -rf data_cache/

      # ── 9. Render the Quarto site ─────────────────────────────────────────────
      - name: Render site
        run: quarto render

      # ── 10. Commit and push the updated docs/ folder ─────────────────────────
      - name: Commit and push rendered site
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          # Only commit if something actually changed
          git diff --staged --quiet || git commit -m "chore: daily report update $(date -u '+%Y-%m-%d')"
          git push
